# Source of truth for the Project Management Committee (PMC) roster.
#
# This file drives two things, so keep it accurate:
#   1. The roster table in `pmc.md` (regenerated by `ci/sync_pmc_docs.py`).
#   2. The format-specification vote gate, which only counts PR approvals from
#      the `handle`s listed here (see `.github/workflows/format-vote-gate.yml`).
#
# Adding or removing a member is itself a PMC vote (roster change). After the
# vote passes, edit this file and run `python ci/sync_pmc_docs.py` to update the
# docs table.
#
# `handle` must match the member's GitHub login exactly (case-insensitive when
# matched). `ecosystem_roles` is free-form markdown and may be empty.
