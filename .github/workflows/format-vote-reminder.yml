name: Format Change Vote Reminder

on:
  # pull_request_target so the comment can be posted on PRs from forks.
  # Applies to drafts and ready-for-review PRs alike. synchronize re-checks on
  # every push, so a format change introduced by a later commit is still caught
  # even if the PR didn't originally touch these paths.
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  remind:
    name: Remind about format spec vote
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const MARKER = '<!-- format-change-vote-reminder -->';

            // The Lance format specification is the proto definitions plus the
            // spec docs. Changes to either require a PMC vote.
            const isFormatFile = (path) =>
              path.endsWith('.proto') || path.startsWith('docs/src/format/');

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });
            const formatFiles = files.map((f) => f.filename).filter(isFormatFile);
            if (formatFiles.length === 0) {
              core.info('No format specification files changed; nothing to do.');
              return;
            }

            // Best effort to comment only once: skip if our marker is present.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            if (comments.some((c) => c.body && c.body.includes(MARKER))) {
              core.info('Reminder already posted; skipping.');
              return;
            }

            const body = [
              MARKER,
              '> [!IMPORTANT]',
              '> **This PR modifies the Lance format specification.**',
              '>',
              '> Changes to the format specification — the `.proto` definitions and the',
              '> spec docs under `docs/src/format/` — require a PMC vote before merge.',
              '>',
              '> - Start a vote following the [Lance community voting process](https://lance.org/community/voting/).',
              '>   Format specification modifications need **3 binding +1 votes** (excluding the',
              '>   proposer), held on GitHub Discussions, with a minimum voting period of **1 week**.',
              '> - Once the vote passes, **link the completed vote in this PR**. This PR should',
              '>   not be merged until the vote is linked.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
            core.info(`Posted format vote reminder (changed: ${formatFiles.join(', ')}).`);
